<html lang="en">
<head>

	<style>
		html, body {
			margin: 0;
			padding: 0;
			overflow-x: hidden;
		}

		html::before {
			display: none;
		}

		body#index {
			background: transparent;
			padding-top: 0;
			margin: 0;
		}

		.bg-layer {
			position: fixed;
			inset: 0;
			z-index: -3;
			background-color: #f0e7db;
			transition: background-color 0.6s ease-out;
		}

		.bg-flower {
			position: fixed;
			inset: 0;
			z-index: -2;
			pointer-events: none;
			overflow: hidden;
		}

		.bg-flower .flower-mask {
			position: absolute;
			mask: url('images/fb.png') no-repeat center;
			mask-size: contain;
			-webkit-mask: url('images/fb.png') no-repeat center;
			-webkit-mask-size: contain;
			background-color: #eed7b8;
			transition: background-color 0.6s ease-out;
			opacity: 0.8;
			will-change: transform;
		}

		.fractal-bg {
			position: fixed;
			inset: 0;
			z-index: -1;
			width: 100vw;
			height: 100vh;
			pointer-events: none;
		}

		header {
			z-index: 10;
		}

		.card-layer {
			position: fixed;
			inset: 0;
			z-index: 2;
			pointer-events: none;
			overflow: hidden;
		}

		.fractal-card {
			position: absolute;
			left: 50%;
			top: 50%;
			width: min(460px, 78vw);
			max-height: 70vh;
			padding: 1.25rem 1.5rem;
			box-sizing: border-box;
			background: rgba(255, 255, 255, 0.92);
			border: 1px solid rgba(60, 60, 90, 0.14);
			border-radius: 20px;
			box-shadow: 0 18px 50px rgba(30, 40, 60, 0.18);
			backdrop-filter: blur(8px);
			pointer-events: auto;
			transform: translate(-50%, -50%);
			transform-origin: center;
			opacity: 0;
			will-change: transform, opacity;
			display: flex;
			flex-direction: column;
			gap: 0.75rem;
			overflow: auto;
		}

		.fractal-card h2 {
			margin: 0;
			font-size: clamp(1.4rem, 2.4vw, 1.9rem);
			color: #223;
			line-height: 1.15;
		}

		.fractal-card .card-eyebrow {
			font-size: 0.8rem;
			text-transform: uppercase;
			letter-spacing: 0.12em;
			font-weight: 700;
			color: #6a6a80;
			margin: 0;
		}

		.fractal-card p {
			margin: 0;
			font-size: 0.95rem;
			line-height: 1.55;
			color: #333;
		}

		.fractal-card img {
			width: 100%;
			max-height: 220px;
			object-fit: cover;
			border-radius: 12px;
			display: block;
		}

		.fractal-card .card-links {
			display: flex;
			flex-wrap: wrap;
			gap: 0.5rem;
			margin-top: 0.3rem;
		}

		.fractal-card .card-links a {
			display: inline-block;
			padding: 0.35rem 0.8rem;
			border-radius: 999px;
			background: rgba(60, 60, 90, 0.08);
			color: #008185;
			font-weight: 600;
			font-size: 0.9rem;
			transition: background 0.2s;
		}

		.fractal-card .card-links a:hover {
			background: rgba(60, 60, 90, 0.16);
		}

		.fractal-card ul {
			margin: 0;
			padding-left: 1.1rem;
			font-size: 0.9rem;
			color: #333;
			line-height: 1.5;
		}

		.fractal-card ul li {
			margin-bottom: 0.3rem;
		}

		.scroll-track {
			position: relative;
			width: 100%;
			pointer-events: none;
		}

		.scroll-hint {
			position: fixed;
			bottom: 2rem;
			left: 50%;
			transform: translateX(-50%);
			color: #4a4a60;
			font-size: 0.85rem;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			opacity: 0.7;
			pointer-events: none;
			transition: opacity 0.4s;
			z-index: 5;
		}

		.scroll-hint.hidden {
			opacity: 0;
		}

		.scroll-hint::after {
			content: '';
			display: block;
			width: 2px;
			height: 28px;
			margin: 0.4rem auto 0;
			background: currentColor;
			animation: scrollPulse 1.8s ease-in-out infinite;
		}

		@keyframes scrollPulse {
			0% { transform: scaleY(0.2); transform-origin: top; opacity: 0.2; }
			50% { transform: scaleY(1); opacity: 1; }
			100% { transform: scaleY(0.2); transform-origin: bottom; opacity: 0.2; }
		}

		.progress-dots {
			position: fixed;
			right: 1rem;
			top: 50%;
			transform: translateY(-50%);
			z-index: 5;
			display: flex;
			flex-direction: column;
			pointer-events: auto;
			max-height: 78vh;
			overflow-y: auto;
			max-width: 200px;

			background: rgba(255, 255, 255, 0.78);
			backdrop-filter: blur(6px);
			border: 1px solid rgba(60, 60, 90, 0.14);
			border-radius: 12px;
			font-size: 0.75rem;
			scrollbar-width: thin;
		}

		.progress-dots::-webkit-scrollbar {
			width: 4px;
		}

		.progress-dots::-webkit-scrollbar-thumb {
			background: rgba(60, 60, 90, 0.25);
			border-radius: 2px;
		}

		.progress-section-label {
			padding: 0.4rem 0.55rem 0.15rem;
			text-transform: uppercase;
			letter-spacing: 0.1em;
			font-weight: 700;
			color: #666;
			font-size: 0.62rem;
			border-top: 1px solid rgba(60, 60, 90, 0.12);
		}

		.progress-section-label:first-child {
			border-top: none;
		}

		.progress-item {
			display: flex;
			align-items: center;
			gap: 0.45rem;
			padding: 0.22rem 0.55rem;
			cursor: pointer;
			border: 0;
			background: transparent;
			text-align: left;
			border-radius: 5px;
			color: #444;
			font: inherit;
			line-height: 1.25;
			transition: background 0.15s, color 0.15s;
			white-space: nowrap;
			overflow: hidden;
			max-width: 100%;
		}

		.progress-item:hover {

			color: #111;
		}

		.progress-item.active {
			background: rgba(60, 60, 90, 0.14);
			color: #111;
			font-weight: 600;
		}

		.progress-item::before {
			content: '';
			display: inline-block;
			width: 5px;
			height: 5px;
			border-radius: 50%;
			background: currentColor;
			opacity: 0.45;
			flex-shrink: 0;
		}

		.progress-item.active::before {
			opacity: 1;
		}

		.progress-item-title {
			overflow: hidden;
			text-overflow: ellipsis;
		}

		@media (max-width: 768px) {
			.fractal-card {

			}

			.fractal-card img {
				max-height: 180px;
			}

			.progress-dots {
				display: none;
			}
		}
	</style>

			function rotatePoint(x, y, angle) {
				const c = Math.cos(angle);
				const s = Math.sin(angle);
				return { x: x * c - y * s, y: x * s + y * c };
			}

			function buildSegments(length, ratio, iterations) {
				const segs = [];
				const seen = new Set();
				const bounds = { minX: 0, maxX: 0, minY: 0, maxY: 0 };

				function track(x, y) {
					if (x < bounds.minX) bounds.minX = x;
					if (x > bounds.maxX) bounds.maxX = x;
					if (y < bounds.minY) bounds.minY = y;
					if (y > bounds.maxY) bounds.maxY = y;
				}

				function add(x1, y1, x2, y2) {
					const ordered = x1 < x2 || (x1 === x2 && y1 <= y2)
						? [x1, y1, x2, y2]
						: [x2, y2, x1, y1];
					const key = ordered.map((v) => v.toFixed(5)).join(':');
					if (seen.has(key)) return;
					seen.add(key);
					segs.push({ x1, y1, x2, y2 });
					track(x1, y1); track(x2, y2);
				}

				function recurse(cx, cy, segLen, horizontal, depth) {
					const half = segLen / 2;
					const branchHalf = segLen * ratio / 2;
					if (horizontal) {
						add(cx - half, cy, cx + half, cy);
						add(cx, cy - branchHalf, cx, cy + branchHalf);
					} else {
						add(cx, cy - half, cx, cy + half);
						add(cx - branchHalf, cy, cx + branchHalf, cy);
					}
					if (depth === 0) return;
					if (horizontal) {
						recurse(cx - half / 2, cy, half, true, depth - 1);
						recurse(cx + half / 2, cy, half, true, depth - 1);
						recurse(cx, cy - branchHalf / 2, branchHalf, false, depth - 1);
						recurse(cx, cy + branchHalf / 2, branchHalf, false, depth - 1);
						return;
					}
					recurse(cx, cy - half / 2, half, false, depth - 1);
					recurse(cx, cy + half / 2, half, false, depth - 1);
					recurse(cx - branchHalf / 2, cy, branchHalf, true, depth - 1);
					recurse(cx + branchHalf / 2, cy, branchHalf, true, depth - 1);
				}

				recurse(0, 0, length, true, iterations);
				return { segments: segs, bounds };
			}

				canvas.style.width = viewportWidth + 'px';
				canvas.style.height = viewportHeight + 'px';
				context.setTransform(dpr, 0, 0, dpr, 0, 0);

				const padding = 30;
				const fractalWidth = Math.max(segmentBounds.maxX - segmentBounds.minX, 1);
				const fractalHeight = Math.max(segmentBounds.maxY - segmentBounds.minY, 1);
				baseScale = Math.min(
					(viewportWidth - padding * 2) / fractalWidth,
					(viewportHeight - padding * 2) / fractalHeight
				);
				baseOffsetX = (viewportWidth - fractalWidth * baseScale) / 2 - segmentBounds.minX * baseScale;
				baseOffsetY = (viewportHeight - fractalHeight * baseScale) / 2 - segmentBounds.minY * baseScale;

				stepHeight = viewportHeight;
				scrollTrack.style.height = ((CONTENT.length + 1) * stepHeight) + 'px';

				positionFlowers();
			}

			function positionFlowers() {
				flowerA.style.left = (viewportWidth * 0.1 - 600) + 'px';
				flowerA.style.top = (viewportHeight * 0.1 - 600) + 'px';
				flowerA.style.transform = 'rotate(15deg)';
				flowerB.style.left = (viewportWidth * 0.95 - 900) + 'px';
				flowerB.style.top = (viewportHeight * 0.65 - 900) + 'px';
				flowerB.style.transform = 'rotate(-28deg)';
			}

			function getStepParams(stepIdx) {
				const sideFlip = stepIdx % 2 === 0 ? 1 : -1;
				const rotFlip = Math.floor(stepIdx / 2) % 2 === 0 ? 1 : -1;
				return {
					rotationDir: ROTATION_DIR * rotFlip,
					childSide: CHILD_SIDE * sideFlip
				};
			}

			function getChildAnchor(params) {
				return { x: 0, y: -params.childSide * params.rotationDir * CHILD_OFFSET };
			}

			function getStepTransform(progress, params) {
				if (progress <= 0) {
					return { angle: 0, zoom: INITIAL_ZOOM, translateX: 0, translateY: 0 };
				}
				const childCenter = getChildAnchor(params);
				const fullAngle = params.rotationDir * Math.PI / 2;
				const fullZoom = INITIAL_ZOOM * STEP_ZOOM;
				const rotatedCenter = rotatePoint(childCenter.x, childCenter.y, fullAngle);
				const targetCenter = {
					x: rotatedCenter.x * fullZoom,
					y: rotatedCenter.y * fullZoom
				};
				return {
					angle: fullAngle * progress,
					zoom: Math.exp(Math.log(STEP_ZOOM) * progress) * INITIAL_ZOOM,
					translateX: targetCenter.x * progress,
					translateY: targetCenter.y * progress
				};
			}

			function applyTransform(x, y, transform) {
				const rotated = rotatePoint(x, y, transform.angle);
				return {
					x: rotated.x * transform.zoom - transform.translateX,
					y: rotated.y * transform.zoom - transform.translateY
				};
			}

			function fractalToScreen(fx, fy) {
				return {
					x: baseOffsetX + fx * baseScale,
					y: baseOffsetY + fy * baseScale
				};
			}

			function hexToRgb(hex) {
				const h = hex.replace('#', '');
				return {
					r: parseInt(h.substring(0, 2), 16),
					g: parseInt(h.substring(2, 4), 16),
					b: parseInt(h.substring(4, 6), 16)
				};
			}

			function rgbToString(c) {
				return `rgb(${Math.round(c.r)}, ${Math.round(c.g)}, ${Math.round(c.b)})`;
			}

			function lerp(a, b, t) { return a + (b - a) * t; }

			function lerpColor(a, b, t) {
				return {
					r: lerp(a.r, b.r, t),
					g: lerp(a.g, b.g, t),
					b: lerp(a.b, b.b, t)
				};
			}

			function smoothstep(a, b, t) {
				const x = Math.max(0, Math.min(1, (t - a) / (b - a)));
				return x * x * (3 - 2 * x);
			}

			function getSectionColorAt(t) {
				const sectionList = ['home', 'research', 'projects'];
				const starts = sectionList.map((s) => SECTIONS[s]);
				const colors = sectionList.map((s) => ({
					bg: hexToRgb(SECTION_COLORS[s].bg),
					flower: hexToRgb(SECTION_COLORS[s].flower),
					stroke: hexToRgb(SECTION_COLORS[s].stroke)
				}));

				let idx = 0;
				for (let i = 0; i < starts.length; i++) {
					if (t >= starts[i]) idx = i;
				}
				const current = colors[idx];
				const next = colors[idx + 1];
				if (!next) return current;

				const nextStart = starts[idx + 1];
				const transitionWidth = 0.9;
				if (t > nextStart - transitionWidth) {
					const f = smoothstep(0, 1, (t - (nextStart - transitionWidth)) / transitionWidth);
					return {
						bg: lerpColor(current.bg, next.bg, f),
						flower: lerpColor(current.flower, next.flower, f),
						stroke: lerpColor(current.stroke, next.stroke, f)
					};
				}
				return current;
			}

			function applyColors(colors) {
				bgLayer.style.backgroundColor = rgbToString(colors.bg);
				const flowerStr = rgbToString(colors.flower);
				flowerA.style.backgroundColor = flowerStr;
				flowerB.style.backgroundColor = flowerStr;
			}

			function drawFractal(transform, strokeColor) {
				context.clearRect(0, 0, viewportWidth, viewportHeight);
				context.lineCap = 'round';
				context.lineJoin = 'round';
				context.lineWidth = Math.max(0.7, 1.8 - ITERATIONS * 0.08);
				context.strokeStyle = rgbToString(strokeColor);
				context.shadowColor = 'rgba(30, 40, 60, 0.14)';
				context.shadowBlur = 10;

				context.beginPath();
				for (let i = 0; i < segments.length; i++) {
					const seg = segments[i];
					const a = applyTransform(seg.x1, seg.y1, transform);
					const b = applyTransform(seg.x2, seg.y2, transform);
					const sa = fractalToScreen(a.x, a.y);
					const sb = fractalToScreen(b.x, b.y);
					context.moveTo(sa.x, sa.y);
					context.lineTo(sb.x, sb.y);
				}
				context.stroke();
			}

			function createCards() {
				cardLayer.innerHTML = '';
				cardElements = CONTENT.map((item, idx) => {
					const card = document.createElement('article');
					card.className = 'fractal-card';
					card.dataset.step = String(idx);
					card.dataset.section = item.section;

					if (item.eyebrow) {
						const eyebrow = document.createElement('p');
						eyebrow.className = 'card-eyebrow';
						eyebrow.textContent = item.eyebrow;
						card.appendChild(eyebrow);
					}

					const title = document.createElement('h2');
					title.textContent = item.title;
					card.appendChild(title);

					if (item.image) {
						const img = document.createElement('img');
						img.src = item.image;
						img.alt = item.title;
						img.loading = 'lazy';
						card.appendChild(img);
					}

					if (item.body) {
						const p = document.createElement('p');
						p.textContent = item.body;
						card.appendChild(p);
					}

					if (item.links && item.links.length) {
						const links = document.createElement('div');
						links.className = 'card-links';
						item.links.forEach((link) => {
							const a = document.createElement('a');
							a.href = link.href;
							a.textContent = link.label;
							if (/^https?:/.test(link.href)) {
								a.target = '_blank';
								a.rel = 'noopener';
							}
							links.appendChild(a);
						});
						card.appendChild(links);
					}

					cardLayer.appendChild(card);
					return card;
				});
			}

			function createProgressDots() {
				progressDots.innerHTML = '';
				let currentSection = null;
				CONTENT.forEach((item, idx) => {
					if (item.section !== currentSection) {
						currentSection = item.section;
						const label = document.createElement('div');
						label.className = 'progress-section-label';
						label.textContent = item.section;
						progressDots.appendChild(label);
					}
					const btn = document.createElement('button');
					btn.className = 'progress-item';
					btn.dataset.step = String(idx);
					btn.dataset.section = item.section;
					btn.setAttribute('aria-label', `Jump to ${item.title}`);
					btn.addEventListener('click', () => scrollToStep(idx));
					const title = document.createElement('span');
					title.className = 'progress-item-title';
					title.textContent = item.title;
					btn.appendChild(title);
					progressDots.appendChild(btn);
				});
			}

			function scrollToStep(step) {
				window.scrollTo({
					top: step * stepHeight,
					behavior: 'smooth'
				});
			}

			function scrollMiniListIntoView(el) {
				const cTop = progressDots.scrollTop;
				const cBottom = cTop + progressDots.clientHeight;
				const elTop = el.offsetTop;
				const elBottom = elTop + el.offsetHeight;
				if (elTop < cTop) {
					progressDots.scrollTop = elTop - 8;
				} else if (elBottom > cBottom) {
					progressDots.scrollTop = elBottom - progressDots.clientHeight + 8;
				}
			}

			function cardOpacity(d) {
				if (d <= -1 || d >= 1) return 0;
				if (d < 0) return smoothstep(-1, -0.1, d);
				if (d > 0.75) return 1 - smoothstep(0.75, 1, d);
				return 1;
			}

			function updateCards(t) {
				const currentStep = Math.floor(t);
				const currentProgress = t - currentStep;
				const params = getStepParams(currentStep);
				const transform = getStepTransform(currentProgress, params);
				const approachAnchor = getChildAnchor(params);

				for (let i = 0; i < cardElements.length; i++) {
					const d = t - i;
					const card = cardElements[i];
					const opacity = cardOpacity(d);

					if (opacity <= 0.01) {
						if (card.style.opacity !== '0') {
							card.style.opacity = '0';
							card.style.visibility = 'hidden';
						}
						continue;
					}

					card.style.visibility = 'visible';

					const anchor = d >= 0 ? CARD_ANCHOR : approachAnchor;
					const pos = applyTransform(anchor.x, anchor.y, transform);
					const screen = fractalToScreen(pos.x, pos.y);

					const offsetX = screen.x - viewportWidth / 2;
					const offsetY = screen.y - viewportHeight / 2;

					const cardZoom = Math.max(0.25, Math.min(1.5, Math.pow(STEP_ZOOM, d)));
					const cardAngle = params.rotationDir * Math.PI / 2 * d;

					card.style.opacity = String(opacity);
					card.style.transform =
						`translate(-50%, -50%) translate(${offsetX}px, ${offsetY}px) ` +
						`rotate(${cardAngle}rad) scale(${cardZoom})`;
					card.style.zIndex = String(100 - Math.abs(i - currentStep));
				}
			}

			function updateNav(t) {
				const sectionList = ['home', 'research', 'projects'];
				let activeSection = sectionList[0];
				for (let i = 0; i < sectionList.length; i++) {
					if (t + 0.4 >= SECTIONS[sectionList[i]]) activeSection = sectionList[i];
				}
				document.querySelectorAll('nav a[data-section]').forEach((a) => {
					a.classList.toggle('current', a.dataset.section === activeSection);
				});
				const activeStep = Math.round(t);
				document.querySelectorAll('.progress-item').forEach((el) => {
					const wasActive = el.classList.contains('active');
					const isActive = Number(el.dataset.step) === activeStep;
					if (isActive !== wasActive) {
						el.classList.toggle('active', isActive);
						if (isActive) scrollMiniListIntoView(el);
					}
				});
			}

			function render() {
				rafPending = false;
				const scrollY = window.scrollY || window.pageYOffset;
				const t = Math.max(0, Math.min(CONTENT.length - 0.001, scrollY / stepHeight));
				if (t === lastRenderedT) return;
				lastRenderedT = t;

				const step = Math.floor(t);
				const progress = t - step;
				const transform = getStepTransform(progress, getStepParams(step));
				const colors = getSectionColorAt(t);

				drawFractal(transform, colors.stroke);
				applyColors(colors);
				updateCards(t);
				updateNav(t);

				if (step !== currentStep) {
					currentStep = step;
					if (scrollY > stepHeight * 0.3) {
						scrollHint.classList.add('hidden');
					} else {
						scrollHint.classList.remove('hidden');
					}
				}
			}

			function requestRender() {
				if (rafPending) return;
				rafPending = true;
				requestAnimationFrame(render);
			}

			function scrollToSection(section) {
				const step = SECTIONS[section];
				if (step === undefined) return;
				window.scrollTo({
					top: step * stepHeight,
					behavior: 'smooth'
				});
			}

			function handleNavClicks() {
				document.querySelectorAll('nav a[data-section]').forEach((a) => {
					a.addEventListener('click', (e) => {
						e.preventDefault();
						scrollToSection(a.dataset.section);
						history.replaceState(null, '', '#' + a.dataset.section);
					});
				});
			}

			function handleInitialHash() {
				const hash = window.location.hash.replace('#', '');
				if (SECTIONS[hash] !== undefined) {
					requestAnimationFrame(() => {
						window.scrollTo({ top: SECTIONS[hash] * stepHeight, behavior: 'auto' });
					});
				}
			}

			function init() {
				const built = buildSegments(BASE_LENGTH, RATIO, ITERATIONS + 1);
				segments = built.segments;
				segmentBounds = built.bounds;
				resizeCanvas();
				createCards();
				createProgressDots();
				handleNavClicks();
				handleInitialHash();

				window.addEventListener('scroll', requestRender, { passive: true });
				window.addEventListener('resize', () => {
					const prevT = stepHeight > 0 ? (window.scrollY / stepHeight) : 0;
					resizeCanvas();
					window.scrollTo({ top: prevT * stepHeight, behavior: 'auto' });
					lastRenderedT = -1;
					requestRender();
				});

				requestRender();
			}

			if (document.readyState === 'loading') {
				document.addEventListener('DOMContentLoaded', init);
			} else {
				init();
			}
		})();
	</script>
</body>
</html>
